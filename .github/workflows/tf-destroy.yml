name: Terraform Destroy

on:
  workflow_dispatch:

# Same group as tf-deploy.yml — prevents destroy and deploy from running simultaneously.
# cancel-in-progress: false → never cancels a destroy in progress.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  destroy-compute:
    name: Destroy — EC2 Test Instances
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compute
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=aws-labs/compute/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}

  destroy-networking:
    name: Destroy — VPCs + TGW + Endpoints
    runs-on: ubuntu-latest
    needs: destroy-compute
    defaults:
      run:
        working-directory: networking
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=aws-labs/networking/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
