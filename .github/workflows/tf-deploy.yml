name: Terraform Deploy

on:
  push:
    branches:
      - main

# Single apply at a time. Shared with tf-destroy.yml so deploy and destroy
# never run simultaneously on the same branch.
# cancel-in-progress: false → queues; never interrupts a running apply.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  networking:
    name: Networking — VPCs + TGW + Endpoints
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    defaults:
      run:
        working-directory: networking
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aws-labs/networking/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve

  compute:
    name: Compute — EC2 Test Instances
    runs-on: ubuntu-latest
    needs: networking
    permissions:
      contents: read
    defaults:
      run:
        working-directory: compute
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aws-labs/compute/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
